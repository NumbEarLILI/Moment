# Debug APK 默认用 ~/.android/debug.keystore。CI 每次都是干净环境时会「现造」一把新钥匙，
# 导致与上一版 CI 包签名不同、无法覆盖安装。下面通过「缓存 keystore」或可选 Secret 固定同一把钥匙。
#
# 可选：在仓库 Settings → Secrets 添加 ANDROID_DEBUG_KEYSTORE_BASE64（本机 debug.keystore 的 base64，
# 例如 Linux: base64 -w0 < ~/.android/debug.keystore），则每次构建都会用该文件，不依赖缓存是否命中。

name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      # Gradle uses compileSdk 36; install matching platform + build-tools.
      - name: Install SDK platform and build-tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      # AGP 仍优先读 local.properties 的 sdk.dir；部分环境下仅依赖 ANDROID_HOME 会报 SDK location not found。
      - name: Write sdk.dir for Gradle
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK" ]; then
            echo "Android SDK path not set (ANDROID_SDK_ROOT / ANDROID_HOME empty)" >&2
            exit 1
          fi
          echo "sdk.dir=$SDK" > local.properties
          echo "ANDROID_HOME=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "Gradle will use SDK at $SDK"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 命中缓存时复用同一把 debug 签名；未命中时由 Gradle 首次生成，本 job 结束会写入缓存供后续 run 使用。
      - name: Cache Android debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: ${{ runner.os }}-moment-debug-keystore-v1

      - name: Install fixed debug keystore from secret (optional)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_B64}" ]; then
            exit 0
          fi
          mkdir -p "${HOME}/.android"
          # Strip whitespace/newlines from pasted secrets; invalid base64 must not fail the job.
          CLEAN="$(printf '%s' "${KEYSTORE_B64}" | tr -d '[:space:]')"
          if [ -z "${CLEAN}" ]; then
            echo "::notice::ANDROID_DEBUG_KEYSTORE_BASE64 is set but empty after trimming; skipping"
            exit 0
          fi
          if ! printf '%s' "${CLEAN}" | base64 -d > "${HOME}/.android/debug.keystore" 2>/dev/null; then
            echo "::warning::ANDROID_DEBUG_KEYSTORE_BASE64 is not valid base64 (e.g. use: base64 -w0 < ~/.android/debug.keystore on Linux). Skipping fixed keystore."
            rm -f "${HOME}/.android/debug.keystore"
            exit 0
          fi
          if [ ! -s "${HOME}/.android/debug.keystore" ]; then
            echo "::warning::Decoded debug keystore is empty; skipping"
            rm -f "${HOME}/.android/debug.keystore"
            exit 0
          fi
          echo "Installed ~/.android/debug.keystore from ANDROID_DEBUG_KEYSTORE_BASE64"

      - name: Assemble debug APK
        env:
          AMAP_WEB_KEY: ${{ secrets.AMAP_WEB_KEY }}
          AMAP_SECURITY_JS_CODE: ${{ secrets.AMAP_SECURITY_JS_CODE }}
          AMAP_WEB_SERVICE_KEY: ${{ secrets.AMAP_WEB_SERVICE_KEY }}
          AMAP_WEB_SERVICE_SECRET: ${{ secrets.AMAP_WEB_SERVICE_SECRET }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
